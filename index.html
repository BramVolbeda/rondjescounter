<style>

  .manage-row:last-of-type { border-bottom: none; }

<body>
<div class="wrap" id="root"><p style="text-align:center;padding-top:80px">Villa openen…</p></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getDatabase, ref, onValue, set, get, remove, push, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const APP_VERSION = 5;

// ---------- badges ----------
const BADGES = [
  { id: "aftrap", emoji: "🍺", naam: "De Aftrap", omschrijving: "Je eerste rondje gehaald", check: (p) => p.gehaald >= 1 },
  { id: "stamgast", emoji: "🏅", naam: "Stamgast", omschrijving: "5 rondjes gehaald", check: (p) => p.gehaald >= 5 },
  { id: "legende", emoji: "👑", naam: "Legende van de Villa", omschrijving: "10 rondjes gehaald", check: (p) => p.gehaald >= 10 },
  { id: "bigspender", emoji: "💸", naam: "Big Spender", omschrijving: "Een rondje van 6+ drankjes gehaald", check: (p) => p.maxRound >= 6 },
  { id: "suikeroom", emoji: "🤑", naam: "Suikeroom", omschrijving: "€50 uitgegeven aan rondjes", check: (p) => p.uitgegeven >= 50 },
  { id: "spons", emoji: "🧽", naam: "De Spons", omschrijving: "15 drankjes op", check: (p) => p.gedronken >= 15 },
  { id: "mixoloog", emoji: "🍹", naam: "Mixoloog", omschrijving: "4 verschillende dranksoorten geprobeerd", check: (p) => p.soorten.size >= 4 },
  { id: "shotjesbaas", emoji: "🥃", naam: "Shotjesbaas", omschrijving: "5 shotjes op (alles met 'shot' in de naam telt)", check: (p) => p.shots >= 5 },
  { id: "weldoener", emoji: "😇", naam: "Weldoener", omschrijving: "Saldo boven de +€15", check: (p) => p.saldo >= 15 },
  { id: "dubbelslag", emoji: "⚡", naam: "Dubbelslag", omschrijving: "Twee rondjes direct achter elkaar gehaald", check: (p) => p.dubbelslag },
  { id: "eergered", emoji: "🫡", naam: "Eer Gered", omschrijving: "Je was aan de beurt en haalde binnen het kwartier", check: (p) => p.eergered },
  { id: "vroegevogel", emoji: "🌅", naam: "Vroege Vogel", omschrijving: "Rondje gehaald vóór 12:00", check: (p) => p.vroeg },
  { id: "nachtburgemeester", emoji: "🦉", naam: "Nachtburgemeester", omschrijving: "Rondje gehaald tussen 02:00 en 06:00", check: (p) => p.nacht },
  { id: "sprintservice", emoji: "🏃", naam: "Sprintservice", omschrijving: "Rondje van 3+ drankjes binnen 5 minuten binnengebracht", check: (p) => p.sprint },
];
function badgeById(id) { return BADGES.find((b) => b.id === id); }
let badgeCache = {}; // naam -> [badge-ids], berekend uit de historie

// ---------- verrekening ----------
// Saldo = uitgegeven aan rondjes − waarde eigen drankjes.
// Plus = geld tegoed (crediteur), min = moet bijleggen (schuldenaar).
// We koppelen tot iedereen op 0 staat, met zo min mogelijk overboekingen.
function computeSettlement(board) {
  const cent = (x) => Math.round(x * 100);
  const debiteuren = board.filter((p) => cent(p.saldo) < 0)
    .map((p) => ({ naam: p.name, bedrag: -cent(p.saldo) })); // positief = te betalen
  const crediteuren = board.filter((p) => cent(p.saldo) > 0)
    .map((p) => ({ naam: p.name, bedrag: cent(p.saldo) }));   // positief = te ontvangen
  debiteuren.sort((a, b) => b.bedrag - a.bedrag);
  crediteuren.sort((a, b) => b.bedrag - a.bedrag);

  const betalingen = [];
  let i = 0, j = 0;
  while (i < debiteuren.length && j < crediteuren.length) {
    const bedrag = Math.min(debiteuren[i].bedrag, crediteuren[j].bedrag);
    if (bedrag > 0) {
      betalingen.push({ van: debiteuren[i].naam, naar: crediteuren[j].naam, bedrag: bedrag / 100 });
    }
    debiteuren[i].bedrag -= bedrag;
    crediteuren[j].bedrag -= bedrag;
    if (debiteuren[i].bedrag === 0) i++;
    if (crediteuren[j].bedrag === 0) j++;
  }
  return betalingen;
}

function settlementText(board, betalingen, totaalEuro) {
  const L = [];
  L.push("🍻 RONDJE! · Eindafrekening Villa Escalatopia");
  L.push("");
  L.push(`Totaal doorheen: ${euro(totaalEuro)} aan drankjes`);
  L.push("");
  L.push("Saldo per persoon:");
  board.forEach((p) => {
    const teken = p.saldo >= 0 ? "+" : "−";
    L.push(`  ${p.name}: ${teken}${euro(Math.abs(p.saldo))}`);
  });
  L.push("");
  if (betalingen.length === 0) {
    L.push("Alles staat gelijk — niemand hoeft iets te verrekenen! 🎉");
  } else {
    L.push("Wie betaalt wie:");
    betalingen.forEach((b) => L.push(`  ${b.van} → ${b.naar}: ${euro(b.bedrag)}`));
  }
  return L.join("\n");
}

function computeAllBadges(history) {
  const per = {};
  const P = (n) => (per[n] ||= {
    gehaald: 0, gedronken: 0, uitgegeven: 0, gekregen: 0,
    soorten: new Set(), shots: 0, maxRound: 0,
    dubbelslag: false, eergered: false, vroeg: false, nacht: false, sprint: false,
  });
  const running = {}; // tussenstand van saldo's voor de eergered-check
  const RS = (n) => (running[n] ||= { uit: 0, kreeg: 0 });
  let prev = null;
  history.forEach((r) => {
    const items = r.items;
    const cost = items.reduce((a, it) => a + (it.price || 0), 0);
    const b = P(r.buyer);
    b.gehaald += 1;
    b.uitgegeven += cost;
    if (items.length > b.maxRound) b.maxRound = items.length;
    const uur = new Date(r.startedAt || r.closedAt).getHours();
    if (uur >= 6 && uur < 12) b.vroeg = true;
    if (uur >= 2 && uur < 6) b.nacht = true;
    if (r.startedAt && r.closedAt - r.startedAt <= 5 * 60 * 1000 && items.length >= 3) b.sprint = true;
    if (prev && prev.buyer === r.buyer) b.dubbelslag = true;
    // eergered: stond deze haler 'aan de beurt' na het vorige rondje, en haalde die snel?
    if (prev && r.startedAt && r.startedAt - prev.closedAt <= 15 * 60 * 1000) {
      const namen = Object.keys(running);
      if (namen.length > 1) {
        const beurtNaam = namen
          .map((n) => ({ n, s: running[n].uit - running[n].kreeg }))
          .sort((x, y) => x.s - y.s)[0].n;
        if (beurtNaam === r.buyer) b.eergered = true;
      }
    }
    items.forEach((it) => {
      const p = P(it.name);
      p.gedronken += 1;
      p.gekregen += it.price || 0;
      p.soorten.add(it.drinkName);
      if ((it.drinkName || "").toLowerCase().includes("shot")) p.shots += 1;
    });
    RS(r.buyer).uit += cost;
    items.forEach((it) => { RS(it.name).kreeg += it.price || 0; });
    prev = r;
  });
  const out = {};
  Object.entries(per).forEach(([n, p]) => {
    p.saldo = p.uitgegeven - p.gekregen;
    out[n] = BADGES.filter((b) => b.check(p)).map((b) => b.id);
  });
  return out;
}

function refreshBadges() {
  badgeCache = computeAllBadges(S.history);
  if (!S.myName) return;
  const mijn = badgeCache[S.myName] || [];
  let seen;
  try { seen = JSON.parse(localStorage.getItem("rondje-badges") || "[]"); } catch { seen = []; }
  const nieuw = mijn.filter((id) => !seen.includes(id));
  if (nieuw.length > 0 && S.newBadges.length === 0) {
    S.newBadges = nieuw;
    playChime();
  }
}

// ---------- helpers ----------
const root = document.getElementById("root");
const esc = (s) => String(s).replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
const euro = (n) => new Intl.NumberFormat("nl-NL", { style: "currency", currency: "EUR" }).format(n || 0);
const timeStr = (ts) => new Date(ts).toLocaleTimeString("nl-NL", { hour: "2-digit", minute: "2-digit" });
const nameKey = (name) => name.replace(/[.#$\[\]\/\s]/g, "_");

const DEFAULT_DRINKS = {
  klein: { name: "Klein biertje", price: 3.2 },
  groot: { name: "Groot biertje", price: 5.5 },
};

// telling per dranksoort: [{drinkName, count, sum}]
function tallyDrinks(items) {
  const map = {};
  items.forEach((it) => {
    const key = it.drinkName || "?";
    map[key] ||= { drinkName: key, count: 0, sum: 0 };
    map[key].count += 1;
    map[key].sum += it.price || 0;
  });
  return Object.values(map).sort((a, b) => b.count - a.count);
}

// ---------- config: uit URL, lokale opslag, of eenmalig plakken ----------
function parseConfigText(txt) {
  txt = String(txt);
  // ook een geplakte deel-link met #cfg=… wordt herkend
  const link = txt.match(/#cfg=([A-Za-z0-9_-]+)/);
  if (link) {
    const c = decodeCfg(link[1]);
    if (c) return c;
  }
  const m = txt.match(/\{[\s\S]*\}/);
  if (!m) return null;
  try { return new Function("return " + m[0])(); } catch { return null; }
}
const encodeCfg = (cfg) =>
  btoa(unescape(encodeURIComponent(JSON.stringify(cfg))))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
const decodeCfg = (s) => {
  try {
    return JSON.parse(decodeURIComponent(escape(atob(s.replace(/-/g, "+").replace(/_/g, "/")))));
  } catch { return null; }
};
function getStoredConfig() {
  const h = new URLSearchParams(location.hash.slice(1)).get("cfg");
  if (h) {
    const c = decodeCfg(h);
    if (c && c.apiKey && c.databaseURL) {
      localStorage.setItem("rondje-config", JSON.stringify(c));
      return c;
    }
  }
  try {
    const c = JSON.parse(localStorage.getItem("rondje-config") || "null");
    if (c && c.apiKey && c.databaseURL) return c;
  } catch { /* geen geldige opgeslagen config */ }
  return null;
}
const shareUrl = (cfg) => `${location.origin}${location.pathname}#cfg=${encodeCfg(cfg)}`;

async function copyText(txt) {
  try {
    await navigator.clipboard.writeText(txt);
    return true;
  } catch {
    const ta = document.createElement("textarea");
    ta.value = txt; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    let ok = false;
    try { ok = document.execCommand("copy"); } catch { ok = false; }
    ta.remove();
    return ok;
  }
}

// ---------- meldingen & geluid ----------
let audioCtx = null;
function ensureAudio() {
  try {
    audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
  } catch { /* geen audio beschikbaar */ }
}
function playChime() {
  try {
    ensureAudio();
    if (!audioCtx) return;
    const notes = [[659.25, 0], [880, 0.14], [1046.5, 0.28]];
    notes.forEach(([freq, delay]) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = "triangle"; o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, audioCtx.currentTime + delay);
      g.gain.exponentialRampToValueAtTime(0.35, audioCtx.currentTime + delay + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + delay + 0.5);
      o.connect(g).connect(audioCtx.destination);
      o.start(audioCtx.currentTime + delay);
      o.stop(audioCtx.currentTime + delay + 0.55);
    });
  } catch { /* geluid is nice-to-have */ }
}
const notifSupported = () => "Notification" in window;
async function notifyRound(buyer) {
  playChime();
  try { navigator.vibrate && navigator.vibrate([200, 100, 200]); } catch {}
  if (!notifSupported() || Notification.permission !== "granted") return;
  const opts = {
    body: `${buyer} haalt een rondje — geef je bestelling door! 🍺`,
    tag: "rondje", renotify: true, vibrate: [200, 100, 200],
  };
  try {
    const reg = navigator.serviceWorker ? await navigator.serviceWorker.getRegistration() : null;
    if (reg && reg.showNotification) reg.showNotification("Rondje! ✦ Villa Escalatopia", opts);
    else new Notification("Rondje! ✦ Villa Escalatopia", opts);
  } catch {
    try { new Notification("Rondje! ✦ Villa Escalatopia", opts); } catch { /* niet ondersteund */ }
  }
}
async function enableNotifications() {
  ensureAudio();
  if (!notifSupported()) {
    showFlash("Meldingen worden hier niet ondersteund — het geluidje in de app werkt wel");
    return;
  }
  const perm = await Notification.requestPermission();
  showFlash(perm === "granted"
    ? "Meldingen staan aan — je hoort het als iemand een rondje haalt! 🔔"
    : "Meldingen geweigerd — het geluidje in de app werkt nog wel");
  render();
}

  orderFor: null, newBadges: [], showBadges: false, showAfrekening: false,
  flash: null, ready: false, shareUrl: "",

};
let db = null;
const R = (p) => ref(db, p);
let flashTimer = null;
const showFlash = (msg) => {
  S.flash = msg; render();
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => { S.flash = null; render(); }, 3500);
};
const drinkById = (id) => S.drinks.find((d) => d.id === id);

function initApp(cfg) {
  const app = initializeApp(cfg);
  db = getDatabase(app);
  S.shareUrl = shareUrl(cfg);

  // service worker voor nette meldingen (optioneel; faalt stil als sw.js ontbreekt)
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }

  let joinsUnsub = null;
  let watchedRoundId = null;
  let prevRoundId = undefined; // undefined = nog geen eerste snapshot gehad

  onValue(R("drinks"), (snap) => {
    const v = snap.val();
    if (!v) { runTransaction(R("drinks"), (cur) => cur || DEFAULT_DRINKS); return; }
    S.drinks = Object.entries(v).map(([id, d]) => ({ id, ...d }));
    render();
  }, () => showFlash("Geen verbinding met de database — check je config en database-rules"));

  onValue(R("members"), (snap) => {
    const v = snap.val() || {};
    S.members = Object.values(v).map((m) => m.name).sort((a, b) => a.localeCompare(b));
    render();
  });

  onValue(R("history"), (snap) => {
    const v = snap.val() || {};
    S.history = Object.entries(v)
      .map(([id, r]) => ({ id, ...r, items: r.items ? Object.values(r.items) : [] }))
      .sort((a, b) => a.closedAt - b.closedAt);
    refreshBadges();
    render();
  });

  onValue(R("activeRound"), (snap) => {
    S.activeRound = snap.val() || null;
    const rid = S.activeRound ? S.activeRound.id : null;

    // melding bij een nieuw rondje van iemand anders (niet bij eerste load)
    if (prevRoundId !== undefined && rid && rid !== prevRoundId
        && S.activeRound.buyer !== S.myName && S.myName) {
      notifyRound(S.activeRound.buyer);
    }
    prevRoundId = rid;

    if (rid !== watchedRoundId) {
      if (joinsUnsub) { joinsUnsub(); joinsUnsub = null; }
      watchedRoundId = rid;
      S.joins = [];
      S.orderFor = null;
      if (rid) {
        joinsUnsub = onValue(R(`joins/${rid}`), (js) => {
          S.joins = Object.values(js.val() || {});
          render();
        });
      }
    }
    S.ready = true;
    render();
  });
}

// ---------- stats ----------
function computeStats() {
  const stats = {};
  const ensure = (n) => (stats[n] ||= { gehaald: 0, gedronken: 0, uitgegeven: 0, gekregen: 0 });
  S.members.forEach(ensure);
  S.history.forEach((r) => {
    const cost = r.items.reduce((a, it) => a + (it.price || 0), 0);
    ensure(r.buyer).gehaald += 1;
    ensure(r.buyer).uitgegeven += cost;
    r.items.forEach((it) => {
      ensure(it.name).gedronken += 1;
      ensure(it.name).gekregen += it.price || 0;
    });
  });
  return Object.entries(stats)
    .map(([name, s]) => ({ name, ...s, saldo: s.uitgegeven - s.gekregen }))
    .sort((a, b) => b.gehaald - a.gehaald || b.saldo - a.saldo || a.name.localeCompare(b.name));
}

// ---------- rendering ----------
function turfSvg(count) {
  if (count === 0) return `<span class="turf-zero">—</span>`;
  let html = `<span class="turf">`;
  let left = count;
  while (left > 0) {
    const g = Math.min(left, 5); left -= 5;
    const w = g === 5 ? 34 : g * 7 + 6;
    html += `<svg width="${w}" height="26" viewBox="0 0 ${w} 26">`;
    for (let j = 0; j < Math.min(g, 4); j++) {
      html += `<line x1="${5 + j * 7}" y1="3" x2="${4 + j * 7}" y2="23" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>`;
    }
    if (g === 5) html += `<line x1="0" y1="20" x2="32" y2="5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>`;
    html += `</svg>`;
  }
  return html + `</span>`;
}

      ${activeItems.length > 0 ? bestelLijst(activeItems, "📋 De bestelling tot nu toe") : ""}
      ${!iAmBuyer ? `
        <p class="label" style="margin-top:16px">${myJoin ? "Jouw bestelling (tik om te wisselen)" : "Wat wil jij?"}</p>
        ${drinkPicker("join", myJoin ? myJoin.drinkId : null)}
        ${myJoin ? `<p style="text-align:center;color:var(--cyan);font-weight:700;margin:12px 0 0">Je staat op de lijst — hij komt eraan 🍻</p>` : ""}` : ""}
      ${iAmBuyer ? `
        <p class="label" style="margin-top:16px">Bestellen voor een ander</p>
        <p style="color:var(--muted);font-size:13px;margin:4px 0 0">Tik een naam aan en kies wat diegene wil — handig voor wie z'n telefoon niet pakt.</p>
        <div class="chips">
          ${S.members.filter((n) => n !== S.myName).map((n) => {
            const j = S.joins.find((x) => x.name === n);
            const d = j ? drinkById(j.drinkId) : null;
            return `<button class="chip${S.orderFor === n ? " pick" : ""}" data-action="orderFor" data-name="${esc(n)}">${esc(n)}${d ? ` <small>· ${esc(d.name)}</small>` : " <small>· nog niks</small>"}</button>`;
          }).join("")}
        </div>
        ${S.orderFor ? `
          <p class="label" style="margin-top:12px">Wat wil ${esc(S.orderFor)}?</p>
          ${drinkPicker("joinFor", orderForJoin ? orderForJoin.drinkId : null)}
          <button class="secbtn" data-action="cancelOrderFor">Toch niet</button>` : ""}` : ""}
      ${(iAmBuyer || roundStale) ? `
        <button class="bigbtn" style="margin-top:16px" data-action="close">✅ Rondje binnen · ${euro(activeTotal)}</button>
        ${iAmBuyer ? `<p style="text-align:center;color:var(--muted);font-size:12px;margin:10px 0 0">Sluit pas af als iedereen z'n drankje heeft doorgegeven. De bestellijst blijft daarna terug te vinden onder "Laatste bestelling".</p>` : ""}` : ""}`;
  }

  root.innerHTML = modal + header + `
    ${beurt && !S.activeRound ? `
      <div class="beurt"><span class="beurt-emoji">🫵</span><div>
        <div class="beurt-name">${beurt.name === S.myName ? "Jij bent aan de beurt!" : esc(beurt.name) + " is aan de beurt"}</div>
        <div class="beurt-sub">Saldo ${euro(beurt.saldo)} · ${beurt.gehaald}x gehaald, ${beurt.gedronken} drankjes op</div>
      </div></div>` : ""}

    <div class="card">${actie}</div>

    ${laatste && !S.activeRound ? `
      <button class="secbtn" data-action="toggleLastOrder">${S.showLastOrder ? "Laatste bestelling verbergen" : `📋 Laatste bestelling terugkijken (${timeStr(laatste.closedAt)})`}</button>
      ${S.showLastOrder ? `
        <div class="card" style="margin-top:12px">
          <p class="label" style="margin:0 0 2px">Laatste bestelling · ${esc(laatste.buyer)} haalde om ${timeStr(laatste.closedAt)}</p>
          ${bestelLijst(laatste.items, "📋 Wat er gehaald moest worden")}
          <div class="chips">
            ${laatste.items.map((it) => `<span class="chip">${it.name === laatste.buyer ? "🍺 " : ""}${esc(it.name)} <small>· ${esc(it.drinkName)}</small></span>`).join("")}
          </div>
        </div>` : ""}` : ""}

    <div class="totals">
      <div class="total"><div class="totalnum">${totaalRondjes}</div><div class="label">Rondjes</div></div>
      <div class="total"><div class="totalnum">${totaalDrankjes}</div><div class="label">Drankjes</div></div>
      <div class="total"><div class="totalnum small">${euro(totaalEuro)}</div><div class="label">Omzet</div></div>
    </div>
    ${weekendTally.length > 0 ? `
      <p class="weekendmix">Dit weekend: ${weekendTally.map((t) => `<b>${t.count}×</b> ${esc(t.drinkName)}`).join(" · ")}</p>` : ""}

    <div class="card">
      <p class="label" style="margin:0 0 4px">De turflijst · rondjes gehaald</p>
      ${board.length === 0 ? `<p style="color:var(--muted);font-size:14px">Nog niemand aangemeld. Deel de link met je groep!</p>` : ""}
      ${board.map((p, i) => `
        <div class="tablerow">
          <span class="rank">${i + 1}</span>
          <span class="pname">${esc(p.name)}${(badgeCache[p.name] || []).length > 0 ? ` <span class="pbadges" title="Badges">${(badgeCache[p.name] || []).map((id) => (badgeById(id) || {}).emoji || "").join("")}</span>` : ""}<small>${p.gedronken} drankjes · ${euro(p.uitgegeven)} uitgegeven</small></span>
          ${turfSvg(p.gehaald)}
          <span class="saldo ${p.saldo >= 0 ? "pos" : "neg"}">${p.saldo >= 0 ? "+" : ""}${euro(p.saldo)}</span>
        </div>`).join("")}
      ${board.length > 0 ? `<p style="color:var(--muted);font-size:12px;margin:12px 0 0">Saldo = uitgegeven aan rondjes − waarde van je eigen drankjes. In de min? Dan ben jij binnenkort aan de beurt.</p>` : ""}
    </div>

    ${board.length > 1 ? `
      <button class="secbtn" data-action="toggleAfrekening">${S.showAfrekening ? "Eindafrekening sluiten" : "🧾 Eindafrekening · wie betaalt wie?"}</button>
      ${S.showAfrekening ? renderAfrekening(board) : ""}` : ""}

    <button class="secbtn" data-action="toggleBadges">${S.showBadges ? "Badges sluiten" : "🏆 Badges · welke kun jij verdienen?"}</button>
    ${S.showBadges ? `
      <div class="card" style="margin-top:12px">
        <p class="label" style="margin:0 0 6px">Jouw badgejacht</p>
        ${(() => {
          const doorIemand = new Set(Object.values(badgeCache).flat());
          return BADGES.map((b) => {
            const earned = (badgeCache[S.myName] || []).includes(b.id);
            const onthuld = doorIemand.has(b.id);
            if (!onthuld) {
              return `
                <div class="badge-row locked">
                  <span class="badge-emoji">❓</span>
                  <span style="flex:1"><b style="font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:17px;color:var(--muted)">Geheime badge</b><br/><span style="color:var(--muted);font-size:13px">Nog door niemand ontgrendeld…</span></span>
                </div>`;
            }
            return `
              <div class="badge-row${earned ? "" : " locked"}">
                <span class="badge-emoji">${b.emoji}</span>
                <span style="flex:1"><b style="font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:17px;color:${earned ? "var(--orange)" : "var(--muted)"}">${esc(b.naam)}</b><br/><span style="color:var(--muted);font-size:13px">${esc(b.omschrijving)}</span></span>
                ${earned ? `<span style="color:var(--cyan);font-weight:700">✓</span>` : ""}
              </div>`;
          }).join("");
        })()}
        <p style="color:var(--muted);font-size:12px;margin:12px 0 0">❓-badges blijven geheim tot iemand in de groep ze als eerste ontgrendelt.</p>
      </div>` : ""}

    <button class="secbtn" data-action="toggleManage">${S.showManage ? "Drankjeskaart sluiten" : "🍹 Drankjeskaart &amp; prijzen"}</button>
    ${S.showManage ? `
      <div class="card" style="margin-top:12px">
        <p class="label" style="margin:0 0 6px">Op de kaart</p>
        ${S.drinks.map((d) => `
          <div class="manage-row">
            <span style="flex:1;font-weight:700">${esc(d.name)}</span>
            <span style="color:var(--orange);font-weight:700">${euro(d.price)}</span>
            <button class="xbtn" data-action="removeDrink" data-id="${esc(d.id)}" aria-label="Verwijder ${esc(d.name)}">✕</button>
          </div>`).join("")}
        <p class="label" style="margin:16px 0 6px">Nieuwe categorie</p>
        <div class="addrow">
          <input id="inp-drinkname" class="input" maxlength="24" placeholder="Bijv. Shotje tequila" />
          <input id="inp-drinkprice" class="input prijs" inputmode="decimal" placeholder="€" />
        </div>
        <button class="secbtn" data-action="addDrink">Toevoegen aan de kaart</button>
        <p style="color:var(--muted);font-size:12px;margin:10px 0 0">Prijswijzigingen gelden voor nieuwe rondjes; oude rondjes houden hun prijs.</p>
      </div>` : ""}

    ${S.history.length > 0 ? `
      <div class="card">
        <p class="label" style="margin:0 0 6px">Laatste rondjes</p>
        ${[...S.history].reverse().slice(0, 8).map((r) => {
          const cost = r.items.reduce((a, it) => a + (it.price || 0), 0);
          const tally = tallyDrinks(r.items).map((t) => `${t.count}× ${esc(t.drinkName)}`).join(", ");
          return `<div class="hist"><b>${esc(r.buyer)}</b> · ${timeStr(r.closedAt)} · ${tally}${cost > 0 ? " · " + euro(cost) : ""}</div>`;
        }).join("")}
      </div>` : ""}

    ${notifyBtn}
    ${shareBtn}

    <p class="note">Iedereen met de deel-link ziet de turflijst en doet mee onder eigen naam.<br/>Updates verschijnen live bij de hele groep. ✦</p>`;

  restore(keep);
}

function restore(keep) {
  Object.entries(keep).forEach(([id, k]) => {
    const el = document.getElementById(id);
    if (el) {
      el.value = k.value;
      if (k.focus) { el.focus(); try { el.setSelectionRange(k.pos, k.pos); } catch {} }
    }
  });
}

// ---------- events ----------
document.addEventListener("click", (e) => {
  ensureAudio(); // audio ontgrendelen bij eerste interactie
  const btn = e.target.closest("[data-action]");
  if (!btn) return;
  const a = btn.dataset.action;
  if (a === "connect") handleConnect();
  else if (a === "register") register();
  else if (a === "pickOwn") { S.pickingOwn = true; render(); }
  else if (a === "cancelPick") { S.pickingOwn = false; render(); }
  else if (a === "start") startRound(btn.dataset.id);
  else if (a === "join") joinRound(btn.dataset.id);
  else if (a === "joinFor") joinForRound(btn.dataset.id);
  else if (a === "orderFor") { S.orderFor = S.orderFor === btn.dataset.name ? null : btn.dataset.name; render(); }
  else if (a === "cancelOrderFor") { S.orderFor = null; render(); }
  else if (a === "close") closeRound();
  else if (a === "toggleManage") { S.showManage = !S.showManage; render(); }
  else if (a === "toggleLastOrder") { S.showLastOrder = !S.showLastOrder; render(); }
  else if (a === "addDrink") addDrink();
  else if (a === "removeDrink") removeDrink(btn.dataset.id);
  else if (a === "share") shareLink();
  else if (a === "notify") enableNotifications();
  else if (a === "toggleBadges") { S.showBadges = !S.showBadges; render(); }
  else if (a === "toggleAfrekening") { S.showAfrekening = !S.showAfrekening; render(); }
  else if (a === "shareAfrekening") shareAfrekening();
  else if (a === "closeBadges") {
    let seen;
    try { seen = JSON.parse(localStorage.getItem("rondje-badges") || "[]"); } catch { seen = []; }
    localStorage.setItem("rondje-badges", JSON.stringify([...new Set([...seen, ...S.newBadges])]));
    S.newBadges = [];
    render();
  }
  else if (a === "closeWhatsNew") {
    localStorage.setItem("rondje-versie", String(APP_VERSION));
    S.showWhatsNew = false; render();
  }
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && e.target.id === "inp-naam") register();
});

// ---------- start ----------
const cfg = getStoredConfig();
if (cfg) initApp(cfg);
else renderSetup();
</script>
</body>
</html>
